<!Doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notepad</title>
    <link rel="stylesheet" href="notepad.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div class="todo-container">
        <button class="mode-toggle" id="mode-toggle" title="toggle-dark-mode">
            <i class="fas fa-moon"></i>
        </button>
        <h1>Todo List</h1>
        <div class="theme-selcetor">
            <div class="theme-btn" style="background: linear-gradient(135deg,#8a2be2,#00c6fb);"
                data-theme="purple-blue"></div>

            <div class="theme-btn" style="background: linear-gradient(135deg,#ff4d4d,#ff9a9e);" data-theme="red"></div>

            <div class="theme-btn" style="background: linear-gradient(135deg,#00b894,#55efc4);" data-theme="green">
            </div>

            <div class="theme-btn" style="background: linear-gradient(135deg,#f7971e,#ffd200);" data-theme="orange">
            </div>

            <div class="theme-btn" style="background: linear-gradient(135deg,#6a11cb,#2575fc);"
                data-theme="blue-purple"></div>

            <div class="theme-btn" style="background: linear-gradient(135deg,#fc466b,#3f5efb);" data-theme="pink-blue">
            </div>

        </div>
        <div class="add-task">
            <input type="text" name="" id="new-task" placeholder="Add new task " autocomplete="off">
            <button id="add-btn"><i class="fa fa-plus"></i>Add</button>
        </div>
<div class="datetime-inputs">
    <input type="date" class="date-input" id="task-date" placeholder="Select date">
      <input type="time" class="date-input" id="time-input" placeholder="Select time">
</div>
        <div class="task-started">
            <div id="total-task">0 tasks</div>
            <div id="completed-task">0 completed</div>
        </div>
        <div class="task-filter active">
            <div class="filter-btn " data-filter="all">All</div>
            <div class="filter-btn" data-filter="active">Active</div>
            <div class="filter-btn" data-filter="completed">Completed</div>
        </div>
        <div class="task-list" id="task-list">
            <div class="empty-task">
                <i class="fa fa-tasks"></i>
                <h3>No task yet</h3>
                <p>Add your first task to get started!</p>


            </div>
        </div>
        <div class="priority-selector-conatiner">
            <div class="priority-selector"><span class="priority-label">Priority</span>
            <div class="priority-options">
                <div class="priority-option" data-priority="High"></div>
                 <div class="priority-option" data-priority="Medium"></div>
                  <div class="priority-option" data-priority="Low"></div>
            </div></div>
        </div>
    </div>

</body>


</html>
