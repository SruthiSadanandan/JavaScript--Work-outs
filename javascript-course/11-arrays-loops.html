function doubleArray(nums){
const numDouble=[];
for (let i=0;i<nums.length;i++){
    num=nums[i];
numDouble.push(num*2)
}
return numDouble;
}

function doubleArrays(nums1){

for (let i=0;i<nums1.length;i++){
    num1=nums1[i];
    if(num1===0){
        return numDoubles;
    }
numDoubles.push(num1*2)
}
return numDoubles;
}
