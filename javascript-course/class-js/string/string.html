<!DOCTYPE html>
<html>

<head>
    <title>String Methods</title>
</head>

<body>

<h5>Character at Index</h5>xd
    <script >
          let str='Hello World';
  document.write(str.length+'<br>');//String length
  document.write(str.charAt(6)+'<br>');//String Character at index
    </script>
    <h5>repeat Methods</h5>
    <script >
          let msg='Hello World';
  document.write(msg.repeat(10)+'<br>');//String repeat
    </script>
    <h5>includes Methods</h5>
    <script >
          let val='Hello World';
  document.write(val.includes('World')+'<br>');//String Character at index
    </script>
</body>

</html>
