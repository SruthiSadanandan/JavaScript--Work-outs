    <script>
        function subscribe() {
            const buttonElement = document.querySelector('.js-suscribe-button')
            if (buttonElement.innerText === 'Subscribe') {
                buttonElement.innerHTML = 'Subscribed';
            } else {
                buttonElement.innerHTML = 'Subscribe';
            }
        }
        function calculateShipping(){
            let orderInput=document.querySelector('.js-order-input');
            let orderCost=Number(orderInput.value);
            if(orderCost<40){
                orderCost+=10;
            }
            document.querySelector('.js-cost').innerHTML=`Shipping Cost: $${orderCost}`;
            // alert(`Shipping Cost: $${orderCost}`);
